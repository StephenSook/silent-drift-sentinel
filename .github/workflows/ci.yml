name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install
        run: uv pip install -e "ml[dev]"
      - name: Lint (ruff)
        run: uv run ruff check ml datahub services
      - name: Test ML (pytest)
        run: uv run pytest ml/tests -q
      - name: Test agent (pytest)
        run: |
          uv pip install acryl-datahub python-dotenv pytest
          uv run pytest services/agent/tests -q

  web:
    name: Web (build + lint + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install
        run: pnpm -C apps/web install --frozen-lockfile
      - name: Lint (eslint)
        run: pnpm -C apps/web lint
      - name: Build (Next.js, includes typecheck)
        run: pnpm -C apps/web build
      - name: Install Playwright browser
        run: pnpm -C apps/web exec playwright install --with-deps chromium
      - name: E2E hero smoke (hermetic, mocked agent)
        run: pnpm -C apps/web exec playwright test

  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        working-directory: apps/mobile
        run: npm ci
      - name: Typecheck (tsc)
        working-directory: apps/mobile
        run: npm run typecheck
